<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ireneusz Zasadni — Message sent</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root{
    --bg:#14161b;
    --bg-alt:#1c1f26;
    --text:#f4f5f7;
    --text-soft:#9aa0ac;
    --line:#2b2f39;
    --accent:#38d996;
    --accent-soft:rgba(56,217,150,0.12);
    --accent-2:#f5a623;
    font-size:17px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:"Iowan Old Style","Georgia",serif;
    background:var(--bg);color:var(--text);line-height:1.6;padding:28px;
  }
  .panel{
    background:var(--bg-alt);border:1px solid var(--line);border-radius:20px;
    padding:56px 48px;text-align:center;max-width:480px;
    position:relative;overflow:hidden;
  }
  .panel::before{
    content:"";position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:320px;height:320px;border-radius:50%;
    background:radial-gradient(circle, rgba(56,217,150,.18), transparent 70%);
  }
  .panel > *{position:relative;z-index:1;}
  .check{
    width:56px;height:56px;margin:0 auto 20px;border-radius:50%;
    background:var(--accent-soft);color:var(--accent);border:1.5px solid var(--accent);
    display:flex;align-items:center;justify-content:center;
  }
  h1{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    font-weight:650;font-size:1.6rem;margin:0 0 .5em;
  }
  p{color:var(--text-soft);margin:0 0 28px;}
  .btn-primary{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    background:var(--accent-2);color:#241703;text-decoration:none;font-weight:700;
    padding:14px 26px;border-radius:100px;font-size:.98rem;
    display:inline-flex;align-items:center;gap:8px;
  }
</style>
</head>
<body>
  <div class="panel">
    <div class="check">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    <h1>Message sent</h1>
    <p>Thank you for reaching out. I'll get back to you as soon as possible — usually within one business day.</p>
    <a class="btn-primary" href="index.html">Back to home</a>
  </div>
</body>
</html>
