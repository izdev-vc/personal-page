<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ireneusz Zasadni — Page not found</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root{
    --bg:#14161b;
    --bg-alt:#1c1f26;
    --text:#f4f5f7;
    --text-soft:#9aa0ac;
    --line:#2b2f39;
    --accent:#38d996;
    --accent-2:#f5a623;
    font-size:17px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:"Iowan Old Style","Georgia",serif;
    background:var(--bg);color:var(--text);line-height:1.6;padding:28px;
  }
  .panel{text-align:center;max-width:480px;}
  .code{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    font-size:4rem;font-weight:800;color:var(--accent);margin-bottom:8px;
  }
  h1{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    font-weight:650;font-size:1.4rem;margin:0 0 .5em;
  }
  p{color:var(--text-soft);margin:0 0 28px;}
  .btn-primary{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    background:var(--accent-2);color:#241703;text-decoration:none;font-weight:700;
    padding:14px 26px;border-radius:100px;font-size:.98rem;
    display:inline-flex;align-items:center;gap:8px;
  }
</style>
</head>
<body>
  <div class="panel">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a class="btn-primary" href="index.html">Back to home</a>
  </div>
</body>
</html>
